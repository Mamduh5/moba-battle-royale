# Reference only. Copy to project infra and set real secrets outside git.
services:
  cockroachdb:
    image: cockroachdb/cockroach:latest-v24.1
    command: start-single-node --insecure --store=attrs=ssd,path=/var/lib/cockroach/
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - nakama_cockroach_data:/var/lib/cockroach

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.37.0
    depends_on:
      - cockroachdb
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address root@cockroachdb:26257 &&
        exec /nakama/nakama
        --name nakama-local
        --database.address root@cockroachdb:26257
        --logger.level DEBUG
        --session.token_expiry_sec 7200
        --metrics.prometheus_port 9100
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
      - "9100:9100"
    volumes:
      - ./nakama_data:/nakama/data

volumes:
  nakama_cockroach_data:
