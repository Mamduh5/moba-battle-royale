services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localpassword
      POSTGRES_USER: nakama
    ports:
      - "5432:5432"
  nakama:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      - postgres
    entrypoint:
      - /bin/sh
      - -ecx
      - >
        /nakama/nakama migrate up --database.address nakama:localpassword@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address nakama:localpassword@postgres:5432/nakama
    volumes:
      - ../../backend/nakama/config/local.yml:/nakama/data/local.yml:ro
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
