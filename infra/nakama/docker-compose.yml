services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: local_nakama_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 2s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
  nakama:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ecx
      - /nakama/nakama migrate up --database.address nakama:local_nakama_password@postgres:5432/nakama && exec /nakama/nakama --config /nakama/data/local.yml --database.address nakama:local_nakama_password@postgres:5432/nakama
    volumes:
      - ../../backend/nakama/config/local.yml:/nakama/data/local.yml:ro
      - ../../backend/nakama:/nakama/data/modules:ro
    ports:
      - "7350:7350"
      - "7351:7351"
